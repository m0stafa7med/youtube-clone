services:
  mongodb:
    image: mongo:7
    container_name: youtube-mongodb
    restart: unless-stopped
    volumes:
      - youtube-mongo-data:/data/db
    networks:
      - youtube-internal

  backend:
    build: ./backend
    container_name: youtube-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    volumes:
      - youtube-uploads:/uploads
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB: ${MONGO_DB:-youtube-clone}
      UPLOAD_STORAGE_DIR: /uploads
      UPLOAD_BASE_URL: ${UPLOAD_BASE_URL:-https://youtube.mostafadarwesh.com}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      AUTH0_USERINFO_ENDPOINT: ${AUTH0_USERINFO_ENDPOINT}
    networks:
      - youtube-internal
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.youtube-api.rule=Host(`youtube.mostafadarwesh.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.youtube-api.entrypoints=websecure"
      - "traefik.http.routers.youtube-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.youtube-api.loadbalancer.server.port=8080"

  frontend:
    build: ./frontend
    container_name: youtube-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - youtube-internal
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.youtube-web.rule=Host(`youtube.mostafadarwesh.com`)"
      - "traefik.http.routers.youtube-web.entrypoints=websecure"
      - "traefik.http.routers.youtube-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.youtube-web.loadbalancer.server.port=80"
      # Lower priority so /api routes match backend first
      - "traefik.http.routers.youtube-web.priority=1"
      - "traefik.http.routers.youtube-api.priority=2"

volumes:
  youtube-mongo-data:
  youtube-uploads:

networks:
  youtube-internal:
    driver: bridge
  traefik-net:
    external: true
